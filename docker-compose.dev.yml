services:
  db:
    ports:
      - "${DB_PORT}:5432"

  redis:
    ports:
      - "${REDIS_PORT}:6379"

  backend:
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${BACKEND_PORT}:8000"

  celery_worker:
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  nginx:
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "${NGINX_PORT}:80"
