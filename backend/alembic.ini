# Alembic configuration file
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The database URL is loaded dynamically in env.py from app.core.config.settings
# Provide a fallback here only; the real URL comes from the environment.
sqlalchemy.url = sqlite:///./church_finance.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
