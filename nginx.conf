events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS (127.0.0.11) can change container IPs on recreate.
    # Nginx resolves upstream names at startup by default, so without this
    # it may keep an old IP and return 502 until nginx restarts.
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 20M;
        set $backend_upstream backend:8000;

        location /api/ {
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
            proxy_pass http://$backend_upstream/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://$backend_upstream/openapi.json;
        }

        location /health {
            proxy_pass http://$backend_upstream/health;
        }

        location /media/tenant-logos/ {
            proxy_pass http://$backend_upstream/media/tenant-logos/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /media/uploads/ {
            proxy_pass http://$backend_upstream/media/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
