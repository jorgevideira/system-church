events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS (127.0.0.11) can change container IPs on recreate.
    # Nginx resolves upstream names at startup by default, so without this
    # it may keep an old IP and return 502 until nginx restarts.
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 20M;
        set $backend_upstream http://backend:8000;

        location /api/ {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass $backend_upstream;
        }

        location /health {
            proxy_pass $backend_upstream;
        }

        location /media/tenant-logos/ {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /media/uploads/ {
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /dev-whatsapp-manager/bootstrap.html {
            try_files $uri =404;
        }

        location /dev-whatsapp-manager-api/ {
            rewrite ^/dev-whatsapp-manager-api/?(.*)$ /$1 break;
            proxy_pass http://evolution-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /manager/assets/ {
            proxy_pass http://evolution-api:8080/assets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /manager/ {
            proxy_pass http://evolution-api:8080/manager/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'href="/assets/' 'href="/manager/assets/';
            sub_filter 'src="/assets/' 'src="/manager/assets/';
        }

        location /dev-whatsapp-manager/assets/ {
            proxy_pass http://evolution-api:8080/assets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dev-whatsapp-manager/ {
            proxy_pass http://evolution-api:8080/manager/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'href="/assets/' 'href="/dev-whatsapp-manager/assets/';
            sub_filter 'src="/assets/' 'src="/dev-whatsapp-manager/assets/';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
