name: ${COMPOSE_PROJECT_NAME:-system-church}

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ${APP_ENV_FILE}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
    env_file:
      - ${APP_ENV_FILE}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
    env_file:
      - ${APP_ENV_FILE}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped

  whatsapp-gateway:
    build:
      context: ./tools/whatsapp_gateway_dev
    env_file:
      - ${APP_ENV_FILE}
    environment:
      GATEWAY_TOKEN: ${WHATSAPP_WEBHOOK_TOKEN}
      GATEWAY_DATA_DIR: /data
      WHATSAPP_WEBJS_CLIENT_ID: ${WHATSAPP_WEBJS_CLIENT_ID:-system-church-prod}
      WHATSAPP_WEBJS_CONNECT_WAIT_MS: ${WHATSAPP_WEBJS_CONNECT_WAIT_MS:-15000}
      WHATSAPP_WEBJS_AUTOLOAD: ${WHATSAPP_WEBJS_AUTOLOAD:-true}
    volumes:
      - whatsapp_gateway_data:/data
    shm_size: "1gb"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    depends_on:
      backend:
        condition: service_started
    networks:
      default:
      proxy_manager:
        aliases:
          - system-church-prod-nginx-1
    restart: unless-stopped

networks:
  proxy_manager:
    external: true

volumes:
  postgres_data:
  uploads_data:
  redis_data:
  whatsapp_gateway_data:
